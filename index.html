          }},
          {label:'否', output:
`输出46:
健康宣教与维持指导，
告知二手烟、三手烟危害，避免环境暴露，
保持健康生活方式，无需戒烟干预。

          }

    const container = document.getElementById('container');
    const backBtn = document.getElementById('backBtn');

    // 状态栈，保存上一步节点，便于返回
    let stateStack = [];

    // 渲染节点
    function renderNode(node) {
      container.innerHTML = '';
      backBtn.style.display = stateStack.length > 0 ? 'inline-block' : 'none';
      container.setAttribute('tabindex', '0');
      container.focus();

      if(node.question) {
        const p = document.createElement('p');
        p.textContent = node.question;
        container.appendChild(p);
      }

      if (node.output) {
        const pre = document.createElement('pre');
        pre.textContent = node.output;
        container.appendChild(pre);
        return;
      }

      if (node.options && node.options.length > 0) {
        node.options.forEach(opt => {
          const btn = document.createElement('button');
          btn.textContent = opt.label;
          btn.onclick = () => {
            optionHandler(opt, node);
          };
          container.appendChild(btn);
        });
        return;
      }

      if (node.inputType === 'number') {
        const input = document.createElement('input');
        input.type = 'number';
        input.id = 'numInput';
        input.autofocus = true;
        container.appendChild(input);

        const submitBtn = document.createElement('button');
        submitBtn.textContent = '提交';
        submitBtn.onclick = () => inputHandler(input.value, node);
        container.appendChild(submitBtn);
        return;
      }
    }

    // 处理选项点击
    function optionHandler(option, currentNode) {
      if(option.output) {
        stateStack.push(currentNode);
        renderNode({output: option.output});
      } else if(option.next) {
        stateStack.push(currentNode);
        renderNode(option.next);
      } else if(option.value) {
        // 从首页点击模块进入对应流程
        stateStack.push(data.home);
        renderNode(data[option.value]);
      }
    }

    // 处理数字输入
    function inputHandler(value, currentNode) {
      const val = Number(value);
      if (!value || isNaN(val)) {
        alert('请输入有效数字');
        return;
      }
      let matchedBranch = null;
      for(const branch of (currentNode.branches || [])) {
        if(val >= branch.range[0] && val <= branch.range[1]){
          matchedBranch = branch;
          break;
        }
      }
      if(!matchedBranch){
        alert('输入数值不在指定范围，请重新输入');
        return;
      }
      stateStack.push(currentNode);
      if(matchedBranch.output){
        renderNode({output: matchedBranch.output});
      } else {
        renderNode(matchedBranch);
      }
    }

    // 返回上一步
    backBtn.onclick = () => {
      if(stateStack.length === 0) return;
      const prev = stateStack.pop();
      renderNode(prev);
    }

    // 初始化
    renderNode(data.home);

  })();
